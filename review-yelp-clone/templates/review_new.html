{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}
  New Review | {{ block.super }}
{% endblock %}

{% block content %}
  <h1>New Review</h1>
  <form action="" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-outline-success">Create Review</button>
  </form>
{% endblock %}
