{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block title %}
  Edit Review | {{ review.restaurant }}
{% endblock %}

{% block content %}
  <h1>Edit {{ review.restaurant }}</h1>
  <form action="" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-info">Update Review</button>
  </form>
{% endblock %}
