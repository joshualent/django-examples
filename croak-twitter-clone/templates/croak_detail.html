{% extends "base.html" %}

{% load crispy_forms_tags %}
{% block title %}{{ croak|truncatechars:40 }} | {{ block.super }}{% endblock title %}

{% block content %}
  {% include "partials/_croak.html" %}

  <hr>
  <h4>Add a comment</h4>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Save</button>
  </form>
  <p class="mt-4"><a href="{% url 'home' %}">Back to feed</a></p>
{% endblock content %}
