{% extends "base.html" %}

{% block title %}Delete {{ croak|truncatechars:30 }}? | {{ block.super }}{% endblock title %}

{% block content %}
  <h1 class="mb-3 h2">Are you sure you want to delete this croak?</h1>
  {% include "partials/_croak.html" %}
  <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
  </form>
{% endblock content %}
