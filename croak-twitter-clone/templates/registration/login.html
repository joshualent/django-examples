{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
  Log In - {{ block.super }}
{% endblock title %}

{% block content %}
  <h2>Log In</h2>
  <form action="" method="post">{% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-success" type="submit">Log In</button>
  </form>
  <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
{% endblock content %}
