{% extends "base.html" %}

{% block title %}Article Delete - {{ article.title}} {% endblock title %}

{% block content %}
  <h1>Delete</h1>
  <form action="" method="post">
    {% csrf_token %}
    <p>
      Are you sure you want to delete "{{ article.title }}"?
    </p>
    <button type="submit" class="btn btn-danger ml-2">
      Confirm Delete
    </button>
  </form>
{% endblock content %}
