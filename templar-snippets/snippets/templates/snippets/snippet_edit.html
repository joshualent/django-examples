{% extends '_base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit "{{ snippet.title }}" | {{ block.super }}{% endblock %}
{% block content %}
  <h1 class="h2">
    Edit "{{ snippet.title }}"
  </h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-success" type="submit">Save</button>
  </form>
{% endblock content %}
