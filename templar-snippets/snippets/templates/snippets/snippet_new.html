{% extends '_base.html' %}
{% load crispy_forms_tags %}
{% block title %}New Snippet | {{ block.super }}{% endblock %}
{% block content %}
  <h1 class="h2">
    Create Snippet
  </h2>
  <form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button class="btn btn-success" type="submit">Create Snippet</button>
  </form>
{% endblock content %}
